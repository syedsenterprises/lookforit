<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Example AI Tool | AI Tool</title>
  <style>
    :root {
      font-family: Arial, sans-serif;
      color: #111;
      background: #f7f7f7;
    }
    body {
      margin: 0;
      padding: 0;
    }
    .page {
      max-width: 900px;
      margin: 40px auto;
      background: #fff;
      border: 1px solid #e5e5e5;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 6px 24px rgba(0,0,0,0.06);
    }
    .hero {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 24px;
      padding: 32px;
      align-items: center;
    }
    .hero img {
      width: 100%;
      height: auto;
      border-radius: 12px;
      object-fit: cover;
      background: #f1f1f1;
    }
    .meta {
      padding: 0 32px 32px;
    }
    h1 {
      margin: 0 0 8px;
      font-size: 32px;
    }
    .category {
      display: inline-block;
      padding: 4px 10px;
      border-radius: 999px;
      background: #eef2ff;
      color: #4338ca;
      font-size: 13px;
      margin-bottom: 12px;
    }
    p {
      margin: 0 0 16px;
      line-height: 1.6;
    }
    .cta a {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: #111827;
      color: #fff;
      padding: 12px 16px;
      border-radius: 10px;
      text-decoration: none;
      font-weight: 600;
      transition: transform 0.1s ease, box-shadow 0.1s ease;
    }
    .cta a:hover {
      transform: translateY(-1px);
      box-shadow: 0 8px 24px rgba(0,0,0,0.12);
    }
    @media (max-width: 720px) {
      .hero {
        grid-template-columns: 1fr;
      }
      .meta { padding: 0 24px 24px; }
    }
  </style>
</head>
<body>
  <main class="page">
    <section class="hero">
      <div>
        <div class="category">AI Tool</div>
        <h1>Example AI Tool</h1>
        <p>A concise description of the AI tool and what it does.</p>
        <div class="cta">
          <a href="https://example.com" target="_blank" rel="noopener noreferrer">Visit Tool →</a>
        </div>
      </div>
      <div>
        <img src="https://via.placeholder.com/800x600.png?text=Example+AI+Tool" alt="Example AI Tool" />
      </div>
    </section>
  </main>
</body>
</html>
